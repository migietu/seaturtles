<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海龜不吃塑！</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- 引入 Babel 來編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 自訂 SVG 圖示元件 ---
        // 更新：更真實的海龜造型，並支援自訂顏色
        const Turtle = ({ className, baseColor = "#4ade80", shellColor = "#166534", scuteColor = "#064e3b", skinDetail = "#22c55e" }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`} style={{ filter: 'drop-shadow(2px 4px 6px rgba(0,0,0,0.4))' }}>
            {/* 前肢 (Front Flippers) */}
            <path d="M 40 30 C 15 10 0 35 15 55 C 25 60 35 40 40 35 Z" fill={baseColor} />
            <path d="M 60 30 C 85 10 100 35 85 55 C 75 60 65 40 60 35 Z" fill={baseColor} />
            
            {/* 後肢 (Back Flippers) */}
            <path d="M 35 65 C 15 80 20 95 35 85 C 45 80 40 70 35 65 Z" fill={baseColor} />
            <path d="M 65 65 C 85 80 80 95 65 85 C 55 80 60 70 65 65 Z" fill={baseColor} />

            {/* 尾巴 (Tail) */}
            <path d="M 45 75 L 50 92 L 55 75 Z" fill={baseColor} />

            {/* 頭部 (Head) */}
            <path d="M 42 25 C 40 5 60 5 58 25 Z" fill={baseColor} />
            
            {/* 眼睛 (Eyes) */}
            <circle cx="46" cy="14" r="2" fill="#111" />
            <circle cx="54" cy="14" r="2" fill="#111" />
            <circle cx="45.5" cy="13.5" r="0.8" fill="#fff" />
            <circle cx="53.5" cy="13.5" r="0.8" fill="#fff" />

            {/* 四肢皮膚紋理 (Skin Details) */}
            <path d="M 22 35 L 18 40 M 28 40 L 22 46 M 15 48 L 18 52" stroke={skinDetail} strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>
            <path d="M 78 35 L 82 40 M 72 40 L 78 46 M 85 48 L 82 52" stroke={skinDetail} strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>

            {/* 龜殼外圈 (Shell Outer) */}
            <ellipse cx="50" cy="50" rx="28" ry="34" fill={shellColor} />
            
            {/* 龜殼內圈邊界 (Shell Inner Rim) */}
            <ellipse cx="50" cy="50" rx="24" ry="30" fill={scuteColor} />

            {/* 龜殼真實盾板紋路 (Scutes Hexagon Pattern) */}
            <path d="M 50 22 L 58 30 L 58 42 L 50 48 L 42 42 L 42 30 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 50 48 L 58 54 L 58 66 L 50 74 L 42 66 L 42 54 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 42 30 L 30 36 L 28 48 L 42 42 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 58 30 L 70 36 L 72 48 L 58 42 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 42 66 L 30 60 L 28 48 L 42 54 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 58 66 L 70 60 L 72 48 L 58 54 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
          </svg>
        );

        const Jellyfish = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-md ${className}`}>
            <path d="M 30 50 Q 20 70 30 90 T 20 100" stroke="#fbcfe8" strokeWidth="3" fill="none" opacity="0.6" />
            <path d="M 50 50 Q 40 80 50 95 T 50 100" stroke="#fbcfe8" strokeWidth="4" fill="none" opacity="0.7" />
            <path d="M 70 50 Q 80 70 70 90 T 80 100" stroke="#fbcfe8" strokeWidth="3" fill="none" opacity="0.6" />
            <path d="M 15 50 C 15 10 85 10 85 50 C 85 55 15 55 15 50 Z" fill="url(#jellyGrad)" opacity="0.8" />
            <defs>
              <radialGradient id="jellyGrad" cx="50%" cy="40%" r="50%" fx="50%" fy="30%">
                <stop offset="0%" stopColor="#ffffff" stopOpacity="0.9" />
                <stop offset="70%" stopColor="#f472b6" stopOpacity="0.6" />
                <stop offset="100%" stopColor="#db2777" stopOpacity="0.3" />
              </radialGradient>
            </defs>
          </svg>
        );

        const LongTentacleJellyfish = ({ className }) => (
          <svg viewBox="0 0 100 150" className={`drop-shadow-md ${className}`}>
            {/* 超長觸手 */}
            <path d="M 30 50 Q 15 90 25 120 T 15 145" stroke="#e9d5ff" strokeWidth="2" fill="none" opacity="0.6" />
            <path d="M 40 50 Q 25 90 40 130 T 30 150" stroke="#d8b4fe" strokeWidth="2.5" fill="none" opacity="0.7" />
            <path d="M 50 50 Q 65 90 50 125 T 55 145" stroke="#c084fc" strokeWidth="3" fill="none" opacity="0.8" />
            <path d="M 60 50 Q 75 90 60 130 T 70 150" stroke="#d8b4fe" strokeWidth="2.5" fill="none" opacity="0.7" />
            <path d="M 70 50 Q 85 90 75 120 T 85 145" stroke="#e9d5ff" strokeWidth="2" fill="none" opacity="0.6" />
            
            {/* 傘狀頭部 */}
            <path d="M 20 50 C 20 15 80 15 80 50 C 80 55 20 55 20 50 Z" fill="url(#longJellyGrad)" opacity="0.8" />
            <defs>
              <radialGradient id="longJellyGrad" cx="50%" cy="40%" r="50%" fx="50%" fy="30%">
                <stop offset="0%" stopColor="#ffffff" stopOpacity="0.9" />
                <stop offset="70%" stopColor="#a855f7" stopOpacity="0.6" />
                <stop offset="100%" stopColor="#7e22ce" stopOpacity="0.4" />
              </radialGradient>
            </defs>
          </svg>
        );

        const EggYolkJellyfish = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-md ${className}`}>
            {/* 短短的叢生觸手 */}
            <path d="M 35 50 Q 30 70 40 85" stroke="#c084fc" strokeWidth="4" strokeLinecap="round" fill="none" opacity="0.8" />
            <path d="M 45 50 Q 40 75 50 90" stroke="#60a5fa" strokeWidth="5" strokeLinecap="round" fill="none" opacity="0.9" />
            <path d="M 50 50 Q 55 80 55 95" stroke="#818cf8" strokeWidth="6" strokeLinecap="round" fill="none" opacity="0.9" />
            <path d="M 55 50 Q 60 75 60 90" stroke="#34d399" strokeWidth="5" strokeLinecap="round" fill="none" opacity="0.8" />
            <path d="M 65 50 Q 70 70 60 85" stroke="#c084fc" strokeWidth="4" strokeLinecap="round" fill="none" opacity="0.8" />
            
            {/* 扁平的透明傘蓋 */}
            <ellipse cx="50" cy="50" rx="40" ry="18" fill="#ffffff" opacity="0.5" />
            <ellipse cx="50" cy="50" rx="35" ry="15" fill="#f8fafc" opacity="0.6" />
            
            {/* 蛋黃中心 */}
            <ellipse cx="50" cy="46" rx="18" ry="12" fill="url(#eggYolkGrad)" />
            <ellipse cx="46" cy="43" rx="6" ry="4" fill="#ffffff" opacity="0.4" />
            
            <defs>
              <radialGradient id="eggYolkGrad" cx="50%" cy="40%" r="50%" fx="40%" fy="30%">
                <stop offset="0%" stopColor="#fef08a" stopOpacity="1" />
                <stop offset="60%" stopColor="#f59e0b" stopOpacity="0.9" />
                <stop offset="100%" stopColor="#b45309" stopOpacity="0.8" />
              </radialGradient>
            </defs>
          </svg>
        );

        const Fish = ({ className, color1, color2 }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-md ${className}`}>
            <path d="M 80 50 L 100 20 L 90 50 L 100 80 Z" fill={color2} />
            <ellipse cx="45" cy="50" rx="40" ry="25" fill={color1} />
            <circle cx="20" cy="45" r="4" fill="#000" />
            <circle cx="22" cy="43" r="1.5" fill="#fff" />
            <path d="M 40 25 Q 50 10 60 25 Z" fill={color2} />
            <path d="M 40 75 Q 50 90 60 75 Z" fill={color2} />
            <path d="M 45 30 Q 55 50 45 70 Q 65 50 45 30" fill={color2} opacity="0.6" />
          </svg>
        );

        const Mermaid = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-2xl ${className}`}>
            {/* 魔法光暈 */}
            <circle cx="50" cy="50" r="45" fill="url(#mermaidGlow)" opacity="0.3" />
            <defs>
              <radialGradient id="mermaidGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#fdf4ff" stopOpacity="1" />
                <stop offset="100%" stopColor="#fdf4ff" stopOpacity="0" />
              </radialGradient>
              {/* 童話風漸層魚尾 */}
              <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#67e8f9" />
                <stop offset="100%" stopColor="#8b5cf6" />
              </linearGradient>
              {/* 金色頭髮漸層 */}
              <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="#fef08a" />
                <stop offset="100%" stopColor="#eab308" />
              </linearGradient>
            </defs>

            {/* 後方波浪大捲髮 */}
            <path d="M 40 10 C 20 10 15 30 25 45 C 15 60 25 80 40 85 C 50 88 65 85 75 75 C 85 60 85 40 75 30 C 80 15 60 10 40 10 Z" fill="url(#hairGrad)" />
            <path d="M 40 15 C 25 15 22 30 30 42 C 22 55 30 70 42 75 C 50 78 60 75 68 68 C 75 58 75 42 68 32 C 70 20 55 15 40 15 Z" fill="#ca8a04" opacity="0.3" />

            {/* 魚尾巴身體 */}
            <path d="M 45 55 Q 30 75 15 85 Q 35 90 55 55 Z" fill="url(#tailGrad)" />
            {/* 魚尾鰭 */}
            <path d="M 15 85 C 5 75 0 70 5 60 C 10 70 12 75 15 85 Z" fill="#8b5cf6" opacity="0.9" />
            <path d="M 15 85 C 5 95 0 100 10 100 C 12 95 14 90 15 85 Z" fill="#c4b5fd" opacity="0.9" />

            {/* 身體軀幹 */}
            <path d="M 42 35 Q 40 45 45 56 L 55 56 Q 60 45 58 35 Z" fill="#ffedd5" />
            
            {/* 粉色貝殼胸罩 */}
            <path d="M 41 42 C 41 38 49 38 48 44 C 47 38 55 38 55 42 C 55 48 48 52 48 52 C 48 52 41 48 41 42 Z" fill="#f472b6" />

            {/* 頭部與臉 */}
            <circle cx="50" cy="25" r="11" fill="#ffedd5" />
            {/* 腮紅 */}
            <circle cx="43" cy="28" r="2.5" fill="#fda4af" opacity="0.8" />
            <circle cx="57" cy="28" r="2.5" fill="#fda4af" opacity="0.8" />
            {/* 開心閉眼 */}
            <path d="M 42 25 Q 44 23 46 25" stroke="#78350f" strokeWidth="1.5" fill="none" strokeLinecap="round" />
            <path d="M 54 25 Q 56 23 58 25" stroke="#78350f" strokeWidth="1.5" fill="none" strokeLinecap="round" />
            {/* 甜美微笑 */}
            <path d="M 48 30 Q 50 33 52 30" stroke="#78350f" strokeWidth="1.5" fill="none" strokeLinecap="round" />

            {/* 前方瀏海與垂下來的捲髮 */}
            <path d="M 39 25 C 39 15 50 10 61 25 C 55 15 45 15 39 25 Z" fill="#fef08a" />
            <path d="M 39 20 Q 30 35 35 50 Q 45 45 42 25 Z" fill="url(#hairGrad)" />
            <path d="M 61 20 Q 70 35 65 50 Q 55 45 58 25 Z" fill="url(#hairGrad)" />
            
            {/* 捲髮的紋理線條 */}
            <path d="M 25 45 C 30 50 20 60 30 65" stroke="#ca8a04" strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.6"/>
            <path d="M 70 35 C 65 40 75 50 65 55" stroke="#ca8a04" strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.6"/>
            <path d="M 35 50 C 38 55 32 60 38 65" stroke="#ca8a04" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.6"/>

            {/* 紅色海星髮飾 */}
            <path d="M 58 15 L 60 19 L 65 19 L 61 22 L 63 26 L 58 23 L 53 26 L 55 22 L 51 19 L 56 19 Z" fill="#f43f5e" />
            <circle cx="58" cy="21" r="1" fill="#fff" opacity="0.8" />
          </svg>
        );

        const Starfish = ({ className, color = "#f43f5e" }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`}>
            <path d="M 50 10 L 62 38 L 92 38 L 68 56 L 77 85 L 50 68 L 23 85 L 32 56 L 8 38 L 38 38 Z" fill={color} />
            <circle cx="50" cy="50" r="3" fill="#fff" opacity="0.6"/>
            <circle cx="50" cy="38" r="2" fill="#fff" opacity="0.6"/>
            <circle cx="40" cy="58" r="2" fill="#fff" opacity="0.6"/>
            <circle cx="60" cy="58" r="2" fill="#fff" opacity="0.6"/>
            <circle cx="50" cy="68" r="2" fill="#fff" opacity="0.6"/>
          </svg>
        );

        const Lobster = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`}>
            {/* 觸角 */}
            <path d="M 75 40 Q 90 20 95 35" stroke="#ef4444" strokeWidth="2" fill="none" strokeLinecap="round" />
            <path d="M 75 60 Q 90 80 95 65" stroke="#ef4444" strokeWidth="2" fill="none" strokeLinecap="round" />
            
            {/* 腳 */}
            <path d="M 40 30 L 35 15" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 50 30 L 45 15" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 60 30 L 55 15" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            
            <path d="M 40 70 L 35 85" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 50 70 L 45 85" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 60 70 L 55 85" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />

            {/* 身體主幹 */}
            <path d="M 25 50 Q 50 30 75 45 L 75 55 Q 50 70 25 50 Z" fill="#ef4444" />
            
            {/* 尾巴 */}
            <path d="M 25 50 Q 10 35 5 50 Q 10 65 25 50 Z" fill="#dc2626" />
            
            {/* 身體紋路 */}
            <path d="M 45 38 L 45 62" stroke="#b91c1c" strokeWidth="2" fill="none" opacity="0.5" />
            <path d="M 55 40 L 55 60" stroke="#b91c1c" strokeWidth="2" fill="none" opacity="0.5" />
            <path d="M 65 42 L 65 58" stroke="#b91c1c" strokeWidth="2" fill="none" opacity="0.5" />

            {/* 大螯 (上) */}
            <path d="M 65 35 Q 85 10 95 25 Q 80 35 65 35" fill="#ef4444" />
            <path d="M 95 25 L 85 28" stroke="#dc2626" strokeWidth="2" fill="none" />
            
            {/* 大螯 (下) */}
            <path d="M 65 65 Q 85 90 95 75 Q 80 65 65 65" fill="#ef4444" />
            <path d="M 95 75 L 85 72" stroke="#dc2626" strokeWidth="2" fill="none" />

            {/* 眼睛 */}
            <circle cx="72" cy="42" r="3" fill="#000" />
            <circle cx="73" cy="41" r="1" fill="#fff" />
            <circle cx="72" cy="58" r="3" fill="#000" />
            <circle cx="73" cy="57" r="1" fill="#fff" />
          </svg>
        );

        const PlasticBag = ({ className, onClick }) => (
          <div onClick={onClick} className={`cursor-pointer transform hover:scale-110 transition-transform ${className}`}>
            <svg viewBox="0 0 100 100" className="drop-shadow-sm w-full h-full">
              <path d="M 30 30 C 30 10 45 10 40 30" stroke="#e5e7eb" strokeWidth="4" fill="none" opacity="0.8" />
              <path d="M 70 30 C 70 10 55 10 60 30" stroke="#e5e7eb" strokeWidth="4" fill="none" opacity="0.8" />
              <path d="M 25 30 L 75 30 L 80 80 Q 50 95 20 80 Z" fill="rgba(255, 255, 255, 0.6)" stroke="#d1d5db" strokeWidth="2" />
              <path d="M 35 30 L 30 70" stroke="#f3f4f6" strokeWidth="2" fill="none" opacity="0.7" />
              <path d="M 65 30 L 60 75" stroke="#f3f4f6" strokeWidth="2" fill="none" opacity="0.7" />
              <path d="M 45 40 L 55 60" stroke="#ffffff" strokeWidth="3" fill="none" opacity="0.9" />
            </svg>
          </div>
        );

        // --- 遊戲主程式 ---
        function App() {
          const [gameState, setGameState] = useState('start');
          const [timeLeft, setTimeLeft] = useState(30);
          const [bags, setBags] = useState([]);
          const [isMusicOn, setIsMusicOn] = useState(true);
          const audioRef = useRef(null);
          const audioCtxRef = useRef(null); // 新增：共用的音效引擎
          
          const turtles = useRef([...Array(3)].map((_, index) => {
            // 預設綠色海龜主題
            let theme = {
              baseColor: "#4ade80", 
              skinDetail: "#22c55e",
              shellColor: "#166534", 
              scuteColor: "#064e3b"
            };
            
            // 將第3隻海龜 (index 2) 變成紅色的
            if (index === 2) {
              theme = {
                baseColor: "#fca5a5", // 粉紅色皮膚
                skinDetail: "#ef4444", // 紅色紋理
                shellColor: "#9f1239", // 深紅色龜殼
                scuteColor: "#4c0519"  // 極深紅縫隙
              };
            }

            return {
              id: Math.random(),
              top: `${Math.random() * 60 + 10}%`,
              animationDuration: `${Math.random() * 15 + 15}s`,
              animationDelay: `-${Math.random() * 10}s`,
              scale: Math.random() * 0.5 + 0.8,
              theme: theme
            };
          }));

          const jellyfishes = useRef([...Array(15)].map(() => {
            // 隨機決定水母種類，加入長觸手和蛋黃水母
            const types = ['normal', 'normal', 'normal', 'long', 'egg'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            return {
              id: Math.random(),
              type: type, // 紀錄種類
              left: `${Math.random() * 80 + 10}%`,
              top: `${Math.random() * 60 + 20}%`,
              animClass: `drift-anim-${Math.floor(Math.random() * 4) + 1}`,
              animationDuration: `${Math.random() * 15 + 15}s`, // 改為 15~30 秒，大幅減緩游動速度
              animationDelay: `-${Math.random() * 10}s`,
              scale: type === 'egg' ? Math.random() * 0.4 + 0.5 : Math.random() * 0.6 + 0.3,
              // 蛋黃水母不改變色相，保持蛋黃色
              hueRotate: type === 'egg' ? '0deg' : `${Math.floor(Math.random() * 360)}deg`
            };
          }));

          const fishes = useRef([...Array(8)].map(() => {
            const colors = [
              { c1: '#f97316', c2: '#fff' },
              { c1: '#facc15', c2: '#3b82f6' },
              { c1: '#ec4899', c2: '#fbcfe8' },
              { c1: '#a855f7', c2: '#fde047' }
            ];
            const color = colors[Math.floor(Math.random() * colors.length)];
            return {
              id: Math.random(),
              top: `${Math.random() * 70 + 10}%`,
              animationDuration: `${Math.random() * 10 + 10}s`,
              animationDelay: `-${Math.random() * 10}s`,
              scale: Math.random() * 0.3 + 0.4,
              direction: Math.random() > 0.5 ? 1 : -1,
              color1: color.c1,
              color2: color.c2
            };
          }));

          const starfishes = useRef([...Array(6)].map(() => ({
            id: Math.random(),
            left: `${Math.random() * 90 + 5}%`,
            bottom: `${Math.random() * 10 + 2}%`,
            scale: Math.random() * 0.4 + 0.4,
            rotation: Math.random() * 360,
            color: ['#f43f5e', '#fb923c', '#f87171', '#fcd34d'][Math.floor(Math.random() * 4)]
          })));

          const lobster = useRef({
            bottom: `${Math.random() * 5 + 2}%`,
            scale: Math.random() * 0.3 + 0.7,
            animationDuration: `${Math.random() * 20 + 25}s`,
            animationDelay: `-${Math.random() * 15}s`
          });

          // 新增：取得並管理共用的音效引擎
          const getAudioCtx = useCallback(() => {
            try {
              if (!audioCtxRef.current) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                  audioCtxRef.current = new AudioContext();
                }
              }
              if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
                audioCtxRef.current.resume();
              }
              return audioCtxRef.current;
            } catch (e) {
              return null;
            }
          }, []);

          const playBubbleSound = useCallback(() => {
            try {
              const ctx = getAudioCtx();
              if (!ctx) return;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'sine';
              osc.frequency.setValueAtTime(400, ctx.currentTime);
              osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
              gain.gain.setValueAtTime(0.3, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
              osc.start();
              osc.stop(ctx.currentTime + 0.1);
            } catch (e) {
              console.log("Audio not supported.", e);
            }
          }, [getAudioCtx]);

          const playWinSound = useCallback(() => {
            try {
              const ctx = getAudioCtx();
              if (!ctx) return;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(440, ctx.currentTime);
              osc.frequency.setValueAtTime(554, ctx.currentTime + 0.1);
              osc.frequency.setValueAtTime(659, ctx.currentTime + 0.2);
              osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
              gain.gain.setValueAtTime(0.2, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
              osc.start();
              osc.stop(ctx.currentTime + 0.8);
            } catch(e){}
          }, [getAudioCtx]);

          const playLoseSound = useCallback(() => {
            try {
              const ctx = getAudioCtx();
              if (!ctx) return;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'sawtooth';
              osc.frequency.setValueAtTime(300, ctx.currentTime);
              osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 1);
              gain.gain.setValueAtTime(0.3, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
              osc.start();
              osc.stop(ctx.currentTime + 1);
            } catch(e){}
          }, [getAudioCtx]);

          const startGame = () => {
            const newBags = [...Array(15)].map((_, index) => ({
              id: index,
              x: Math.random() * 80 + 10,
              y: Math.random() * 70 + 15,
              active: true,
              animClass: `bag-float-anim-${Math.floor(Math.random() * 3) + 1}`,
              floatDuration: Math.random() * 2.5 + 2,
              floatDelay: Math.random() * -5,
              rotation: Math.random() > 0.5 ? (Math.random() * 30 - 15) : (180 + Math.random() * 30 - 15),
              scale: Math.random() * 0.4 + 0.5 // 將大小限制在 0.5 到 0.9 倍之間
            }));
            setBags(newBags);
            setTimeLeft(30);
            setGameState('playing');

            if (isMusicOn && audioRef.current) {
              audioRef.current.play().catch(e => console.log("音樂播放被瀏覽器阻擋", e));
            }
          };

          const handleBagClick = (id) => {
            if (gameState !== 'playing') return;
            playBubbleSound();
            setBags(prev => prev.map(bag => 
              bag.id === id ? { ...bag, active: false } : bag
            ));
          };

          useEffect(() => {
            let timer;
            if (gameState === 'playing') {
              timer = setInterval(() => {
                setTimeLeft((prev) => {
                  if (prev <= 1) {
                    clearInterval(timer);
                    return 0;
                  }
                  return prev - 1;
                });
              }, 1000);
            }
            return () => clearInterval(timer);
          }, [gameState]);

          useEffect(() => {
            if (gameState === 'playing') {
              const activeBags = bags.filter(b => b.active).length;
              if (activeBags === 0) {
                setGameState('won');
                playWinSound();
              } else if (timeLeft === 0) {
                setGameState('lost');
                playLoseSound();
              }
            }
          }, [bags, timeLeft, gameState, playWinSound, playLoseSound]);

          const toggleMusic = () => {
            if (isMusicOn && audioRef.current) {
              audioRef.current.pause();
            } else if (!isMusicOn && audioRef.current) {
              audioRef.current.play().catch(e => console.log("音樂播放被瀏覽器阻擋", e));
            }
            setIsMusicOn(!isMusicOn);
          };

          return (
            <div 
              className="relative w-full h-screen overflow-hidden font-sans select-none bg-cover bg-center bg-no-repeat bg-blue-400"
              style={{ backgroundImage: "url('SEA.png')" }}
            >
              <audio ref={audioRef} src="bgm.mp3" loop preload="auto" />

              <button 
                onClick={toggleMusic}
                className="absolute top-4 right-4 z-50 bg-white/90 backdrop-blur-md w-14 h-14 flex items-center justify-center rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.2)] text-2xl hover:scale-110 transition-transform border-4 border-cyan-200 cursor-pointer"
                title={isMusicOn ? "關閉音樂" : "開啟音樂"}
              >
                {isMusicOn ? '🎵' : '🔇'}
              </button>

              <style>{`
                @keyframes swimRight {
                  0% { transform: translateX(-150px) rotate(90deg) scale(var(--scale)); }
                  100% { transform: translateX(120vw) rotate(90deg) scale(var(--scale)); }
                }
                @keyframes swimFishRight {
                  0% { transform: translateX(-150px) scaleX(-1) scale(var(--scale)); }
                  100% { transform: translateX(120vw) scaleX(-1) scale(var(--scale)); }
                }
                @keyframes swimFishLeft {
                  0% { transform: translateX(120vw) scale(var(--scale)); }
                  100% { transform: translateX(-150px) scale(var(--scale)); }
                }
                @keyframes popOut {
                  0% { transform: scale(1); opacity: 1; }
                  50% { transform: scale(1.5); opacity: 0.8; }
                  100% { transform: scale(0); opacity: 0; }
                }
                @keyframes sparkleAnim {
                  0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
                  50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
                }
                @keyframes gradientBG {
                  0% { background-position: 0% 50%; }
                  50% { background-position: 100% 50%; }
                  100% { background-position: 0% 50%; }
                }

                @keyframes naturalFloat1 {
                  0%, 100% { transform: translate(0, 0) rotate(-3deg); }
                  33% { transform: translate(0.5vw, -3vh) rotate(2deg); }
                  66% { transform: translate(-0.5vw, -1.5vh) rotate(-1deg); }
                }
                @keyframes naturalFloat2 {
                  0%, 100% { transform: translate(0, 0) rotate(4deg); }
                  33% { transform: translate(-0.8vw, -4vh) rotate(-2deg); }
                  66% { transform: translate(0.5vw, -2vh) rotate(1deg); }
                }
                @keyframes naturalFloat3 {
                  0%, 100% { transform: translate(0, 0) rotate(-2deg); }
                  33% { transform: translate(1vw, -5vh) rotate(3deg); }
                  66% { transform: translate(-1vw, -2.5vh) rotate(-1deg); }
                }

                @keyframes drift1 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  25% { transform: translate(15vw, -15vh) rotate(15deg); }
                  50% { transform: translate(5vw, -25vh) rotate(-5deg); }
                  75% { transform: translate(-10vw, -10vh) rotate(-15deg); }
                }
                @keyframes drift2 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  33% { transform: translate(-15vw, 15vh) rotate(-20deg); }
                  66% { transform: translate(10vw, 20vh) rotate(10deg); }
                }
                @keyframes drift3 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  25% { transform: translate(-15vw, -10vh) rotate(-10deg); }
                  50% { transform: translate(10vw, -20vh) rotate(15deg); }
                  75% { transform: translate(20vw, 5vh) rotate(5deg); }
                }
                @keyframes drift4 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  33% { transform: translate(20vw, -15vh) rotate(15deg); }
                  66% { transform: translate(-20vw, -5vh) rotate(-15deg); }
                }

                @keyframes mermaidFloat {
                  0%, 100% { transform: translateY(0) rotate(-2deg); }
                  50% { transform: translateY(-15px) rotate(2deg); }
                }

                @keyframes lobsterWalkAnim {
                  0% { transform: translateX(-150px) scale(var(--scale)); }
                  100% { transform: translateX(120vw) scale(var(--scale)); }
                }
                @keyframes lobsterScuttle {
                  0%, 100% { transform: translateY(0) rotate(0deg); }
                  25% { transform: translateY(-3px) rotate(-2deg); }
                  75% { transform: translateY(-3px) rotate(2deg); }
                }

                .turtle-anim { animation: swimRight linear infinite; }
                .fish-right-anim { animation: swimFishRight linear infinite; }
                .fish-left-anim { animation: swimFishLeft linear infinite; }
                .bag-pop { animation: popOut 0.4s ease-out forwards; }
                .sparkle-anim { animation: sparkleAnim 2s ease-in-out infinite; }
                .mermaid-anim { animation: mermaidFloat 6s ease-in-out infinite; }
                
                .lobster-walk-anim { animation: lobsterWalkAnim linear infinite; }
                .lobster-scuttle-anim { animation: lobsterScuttle 0.5s ease-in-out infinite; }

                .bag-float-anim-1 { animation: naturalFloat1 ease-in-out infinite; }
                .bag-float-anim-2 { animation: naturalFloat2 ease-in-out infinite; }
                .bag-float-anim-3 { animation: naturalFloat3 ease-in-out infinite; }

                .drift-anim-1 { animation: drift1 ease-in-out infinite alternate; }
                .drift-anim-2 { animation: drift2 ease-in-out infinite alternate; }
                .drift-anim-3 { animation: drift3 ease-in-out infinite alternate; }
                .drift-anim-4 { animation: drift4 ease-in-out infinite alternate; }

                .sea-bed {
                  background-image: radial-gradient(circle at 50% 100%, #064e3b 0%, #0f766e 30%, transparent 70%);
                }
              `}</style>

              <div className="absolute bottom-0 w-full h-1/3 sea-bed opacity-70 pointer-events-none z-0"></div>
              
              {/* 海星群 */}
              {starfishes.current.map(star => (
                <div key={star.id} className="absolute z-10 pointer-events-none starfish-wobble-anim" style={{
                  left: star.left,
                  bottom: star.bottom,
                  width: '60px', height: '60px',
                  '--scale': star.scale,
                  '--rot': `${star.rotation}deg`,
                  animationDuration: star.animationDuration,
                  animationDelay: star.animationDelay
                }}>
                  <Starfish className="w-full h-full" color={star.color} />
                </div>
              ))}

              {/* 龍蝦 */}
              <div className="absolute z-10 pointer-events-none lobster-walk-anim" style={{
                left: 0,
                bottom: lobster.current.bottom,
                width: '120px', height: '120px',
                '--scale': lobster.current.scale,
                animationDuration: lobster.current.animationDuration,
                animationDelay: lobster.current.animationDelay
              }}>
                <div className="w-full h-full lobster-scuttle-anim">
                  <Lobster className="w-full h-full" />
                </div>
              </div>

              {/* 美人魚位置調整：從 right-10 改為 right-[25%]，讓她移向中央偏右 */}
              <div 
                className="absolute bottom-4 right-[25%] pointer-events-none z-20 mermaid-anim" 
                style={{ width: '180px', height: '180px' }}
              >
                <Mermaid className="w-full h-full" />
              </div>

              {fishes.current.map((fish) => (
                <div
                  key={fish.id}
                  className={`absolute pointer-events-none z-10 ${fish.direction === 1 ? 'fish-right-anim' : 'fish-left-anim'}`}
                  style={{
                    top: fish.top,
                    left: fish.direction === 1 ? '-10%' : 'auto',
                    right: fish.direction === -1 ? '-10%' : 'auto',
                    width: '80px',
                    height: '80px',
                    '--scale': fish.scale,
                    animationDuration: fish.animationDuration,
                    animationDelay: fish.animationDelay
                  }}
                >
                  {/* 根據種類顯示不同的魚 */}
                  {fish.type === 'nemo' ? (
                    <Clownfish className="w-full h-full" />
                  ) : fish.type === 'dory' ? (
                    <BlueTang className="w-full h-full" />
                  ) : (
                    <Fish className="w-full h-full" color1={fish.color1} color2={fish.color2} />
                  )}
                </div>
              ))}

              {turtles.current.map((turtle) => (
                <div 
                  key={turtle.id}
                  className="absolute turtle-anim pointer-events-none z-10"
                  style={{
                    top: turtle.top,
                    left: '-10%',
                    width: '120px',
                    height: '120px',
                    '--scale': turtle.scale,
                    animationDuration: turtle.animationDuration,
                    animationDelay: turtle.animationDelay
                  }}
                >
                  <Turtle 
                    className="w-full h-full" 
                    baseColor={turtle.theme.baseColor}
                    shellColor={turtle.theme.shellColor}
                    scuteColor={turtle.theme.scuteColor}
                    skinDetail={turtle.theme.skinDetail}
                  />
                </div>
              ))}

              {jellyfishes.current.map((jelly) => (
                <div 
                  key={jelly.id}
                  className="absolute pointer-events-none z-20"
                  style={{
                    top: jelly.top,
                    left: jelly.left,
                    width: jelly.type === 'long' ? '80px' : '80px',
                    height: jelly.type === 'long' ? '120px' : '80px', // 長水母給予更長的容器
                    transform: `scale(${jelly.scale})`,
                    filter: `hue-rotate(${jelly.hueRotate})`
                  }}
                >
                  <div 
                    className={`w-full h-full ${jelly.animClass}`}
                    style={{
                      animationDuration: jelly.animationDuration,
                      animationDelay: jelly.animationDelay
                    }}
                  >
                    {jelly.type === 'egg' ? (
                      <EggYolkJellyfish className="w-full h-full" />
                    ) : jelly.type === 'long' ? (
                      <LongTentacleJellyfish className="w-full h-full" />
                    ) : (
                      <Jellyfish className="w-full h-full" />
                    )}
                  </div>
                </div>
              ))}

              {gameState === 'playing' && (
                <div className="absolute top-4 left-0 w-full flex justify-center z-50 pointer-events-none">
                  <div className="bg-white/90 backdrop-blur-md px-8 py-3 rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.2)] border-4 border-cyan-300 flex items-center gap-6 transform hover:scale-105 transition-transform">
                    <div className="text-2xl font-black text-cyan-800">
                      ⏳ 時間: <span className={timeLeft <= 5 ? 'text-red-500 animate-pulse text-3xl' : 'text-cyan-600'}>{timeLeft}</span> 秒
                    </div>
                    <div className="w-1 h-8 bg-cyan-200 rounded-full"></div>
                    <div className="text-xl font-black text-slate-700 flex items-center gap-2">
                      剩餘垃圾: <span className="text-pink-500 text-3xl">{bags.filter(b => b.active).length}</span>
                    </div>
                  </div>
                </div>
              )}

              {gameState === 'playing' && bags.map((bag) => (
                <div
                  key={bag.id}
                  className="absolute z-30 w-24 h-24"
                  style={{
                    left: `${bag.x}%`,
                    top: `${bag.y}%`,
                    transform: `scale(${bag.scale})`
                  }}
                >
                   <div 
                    className={`w-full h-full ${bag.active ? bag.animClass : 'bag-pop pointer-events-none'}`}
                    style={{
                      animationDuration: `${bag.floatDuration}s`,
                      animationDelay: `${bag.floatDelay}s`
                    }}
                  >
                    {bag.active && (
                      <div style={{ transform: `rotate(${bag.rotation}deg)`, width: '100%', height: '100%' }}>
                        <PlasticBag onClick={() => handleBagClick(bag.id)} className="w-full h-full" />
                      </div>
                    )}
                  </div>
                </div>
              ))}

              {gameState === 'start' && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
                  <div className="bg-white/95 backdrop-blur-xl rounded-[3rem] p-10 max-w-lg w-[90%] text-center shadow-2xl border-8 border-cyan-400 transform transition-transform hover:scale-105">
                    <h1 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-teal-400 mb-6 drop-shadow-sm">
                      海龜不吃塑！
                    </h1>
                    <p className="text-2xl text-slate-700 mb-6 font-bold leading-relaxed">
                      美麗的海洋被丟滿了塑膠袋！<br/>
                      海龜可能會把它們誤認為水母吃掉...<br/>
                      <span className="text-rose-500 font-black text-3xl bg-rose-100 px-2 py-1 rounded-lg mt-2 inline-block">請在 30 秒內點擊清除所有垃圾！</span>
                    </p>
                    <div className="flex justify-center items-center gap-4 mb-10 bg-blue-50 py-4 rounded-3xl border-2 border-blue-100">
                      <Turtle className="w-20 h-20" />
                      <div className="text-4xl animate-pulse">❤️</div>
                      <Jellyfish className="w-20 h-20" />
                      <div className="text-4xl">💔</div>
                      <PlasticBag className="w-20 h-20" />
                    </div>
                    <button 
                      onClick={startGame}
                      className="w-full py-5 bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white text-4xl font-black rounded-3xl shadow-[0_8px_0_rgb(4,120,87)] active:shadow-[0_0px_0_rgb(4,120,87)] active:translate-y-2 transition-all"
                    >
                      開始拯救海洋！
                    </button>
                  </div>
                </div>
              )}

              {gameState === 'won' && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-[length:400%_400%] animate-[gradientBG_10s_ease_infinite] bg-gradient-to-br from-pink-400 via-purple-400 to-yellow-400 backdrop-blur-md overflow-hidden">
                  <div className="relative bg-white/95 rounded-[3rem] p-10 max-w-lg w-[90%] text-center shadow-[0_20px_60px_rgba(0,0,0,0.3)] border-8 border-white animate-bounce">
                    <div className="absolute -top-12 -left-12 text-6xl sparkle-anim">✨</div>
                    <div className="absolute -top-8 -right-8 text-7xl sparkle-anim" style={{animationDelay: '0.5s'}}>🌟</div>
                    <div className="absolute -bottom-10 -left-6 text-6xl sparkle-anim" style={{animationDelay: '1s'}}>🐠</div>
                    <div className="absolute -bottom-12 -right-10 text-7xl sparkle-anim" style={{animationDelay: '1.5s'}}>🐢</div>

                    <div className="text-8xl mb-6 drop-shadow-lg">🎉👑🐢</div>
                    <h2 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 mb-6 drop-shadow-sm">
                      超級大成功！
                    </h2>
                    <div className="bg-pink-50 rounded-3xl p-6 mb-10 border-4 border-pink-100">
                      <p className="text-3xl text-slate-700 font-black leading-relaxed">
                        你把海洋打掃得亮晶晶！<br/>
                        <span className="text-indigo-500">海龜們超級開心！✨</span>
                      </p>
                    </div>
                    <button 
                      onClick={startGame}
                      className="px-10 py-5 w-full bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 text-white text-4xl font-black rounded-full shadow-[0_8px_0_rgb(194,65,12)] active:shadow-[0_0px_0_rgb(194,65,12)] active:translate-y-2 transition-all transform hover:scale-105"
                    >
                      再玩一次
                    </button>
                  </div>
                </div>
              )}

              {gameState === 'lost' && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-[length:400%_400%] animate-[gradientBG_10s_ease_infinite] bg-gradient-to-br from-indigo-500 via-purple-500 to-orange-400 backdrop-blur-md">
                  <div className="relative bg-white/95 rounded-[3rem] p-10 max-w-lg w-[90%] text-center shadow-[0_20px_60px_rgba(0,0,0,0.4)] border-8 border-orange-300">
                    <div className="text-8xl mb-6 drop-shadow-xl animate-bounce">🥺🐢💦</div>
                    <h2 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-rose-500 mb-6">
                      哎呀！時間到了
                    </h2>
                    <div className="bg-orange-50 rounded-3xl p-6 mb-10 border-4 border-orange-200">
                      <p className="text-2xl text-slate-700 font-black leading-relaxed">
                        海裡還有 <span className="text-rose-500 text-6xl mx-2 animate-pulse">{bags.filter(b => b.active).length}</span> 個塑膠袋<br/>
                        海洋生物需要你再試一次！
                      </p>
                    </div>
                    <button 
                      onClick={startGame}
                      className="px-10 py-5 w-full bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-600 hover:to-pink-700 text-white text-4xl font-black rounded-full shadow-[0_8px_0_rgb(159,18,57)] active:shadow-[0_0px_0_rgb(159,18,57)] active:translate-y-2 transition-all transform hover:scale-105"
                    >
                      重新挑戰！
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // 渲染 React 應用程式到畫面上的 root 節點
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
